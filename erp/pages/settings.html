    <main class="page-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Settings</h1>
          <p class="page-desc">Manage your account and preferences.</p>
        </div>
      </div>

      <div class="grid-2-col" style="gap:24px; align-items:start;">
        <div class="card">
          <div class="card-header"><h3 class="card-title">Profile Information</h3></div>
          <div class="card-body">
            <form id="profile-form">
              <div class="form-group">
                <label class="form-label" for="full_name">Full Name</label>
                <input type="text" class="input" id="full_name" name="full_name" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" class="input" id="email" name="email" disabled>
                <span class="text-xs text-muted mt-1" style="display:block;">Email cannot be changed</span>
              </div>
              <div class="form-group">
                <label class="form-label" for="phone">Phone</label>
                <input type="text" class="input" id="phone" name="phone">
              </div>
              <div class="form-group">
                <label class="form-label" for="role">System Role</label>
                <input type="text" class="input" id="role" name="role" disabled style="text-transform: capitalize;">
              </div>
              <div class="mt-4 text-right">
                <button type="submit" class="btn btn-purple">Update Profile</button>
              </div>
            </form>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><h3 class="card-title">Change Password</h3></div>
          <div class="card-body">
            <form id="password-form">
              <div class="form-group">
                <label class="form-label" for="password">New Password</label>
                <input type="password" class="input" id="password" name="password" required minlength="6">
              </div>
              <div class="form-group">
                <label class="form-label" for="confirm_password">Confirm New Password</label>
                <input type="password" class="input" id="confirm_password" name="confirm_password" required minlength="6">
              </div>
              <div class="mt-4 text-right">
                <button type="submit" class="btn btn-secondary">Update Password</button>
              </div>
            </form>
          </div>
        </div>
      </div>
